name: CI — Lint, Test & Security

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # FRONTEND: Lint → Format check → Build → Test → Audit
  # ─────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true   # Don't block PR, just report

  # ─────────────────────────────────────────
  # BACKEND: Lint → Format check → Test → Audit
  # ─────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─────────────────────────────────────────
  # SECURITY: Dependency vulnerability scan
  # ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm audit --json > ../audit-frontend.json || true
          npm audit --audit-level=critical

      - name: Audit backend dependencies
        run: |
          cd backend
          npm audit --json > ../audit-backend.json || true
          npm audit --audit-level=critical

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-reports
          path: |
            audit-frontend.json
            audit-backend.json
          retention-days: 30
